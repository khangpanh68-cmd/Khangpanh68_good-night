# Tên quy trình triển khai phiên bản V18.6
name: Deploy Love Project V18.6

on:
  # Tự động chạy khi Khang push code lên nhánh chính
  push:
    branches: ["main", "master"]
  
  # Cho phép kích hoạt thủ công từ tab Actions trên GitHub
  workflow_dispatch:

# Thiết lập quyền hạn (Permissions) chuẩn 2026 cho GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo quy trình không bị chồng chéo khi bạn update code liên tục
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4
        with:
          # Đảm bảo lấy toàn bộ lịch sử commit để tính toán chính xác
          fetch-depth: 0

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Triển khai toàn bộ file tại thư mục gốc (nơi chứa index.html)
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
