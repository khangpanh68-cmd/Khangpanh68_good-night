name: Deploy Love Project V18.6

on:
  push:
    # Tự động chạy khi Khang đẩy code (push) lên nhánh main hoặc master
    branches: ["main", "master"]
  
  # Cho phép Khang kích hoạt thủ công từ tab Actions trên giao diện GitHub
  workflow_dispatch:

# Thiết lập quyền hạn tối ưu để GitHub Actions có thể ghi dữ liệu lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo chỉ có một quy trình triển khai chạy tại một thời điểm để tránh lỗi xung đột
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Đảm bảo lấy toàn bộ lịch sử code
          fetch-depth: 0

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Triển khai toàn bộ file tại thư mục gốc (nơi chứa file index.html)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
