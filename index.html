<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Love v4.0</title>
    <style>
        :root {
            --accent: #ff2d55;
            --bg: #020205;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
            padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 100%;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .heart-glow {
            width: 70px;
            height: 70px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--accent));
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #message {
            font-size: 1.05rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 15px;
            background: var(--accent);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 25px var(--accent)); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="universe"></canvas>

    <div class="ui-layer">
        <div class="glass-box">
            <svg class="heart-glow" viewBox="0 0 32 32">
                <path fill="#ff2d55" d="M16 28.5L14.1 26.7C7.33 20.58 3 16.5 3 11.5 3 7.42 6.42 4 10.5 4c2.31 0 4.52 1.08 6 2.79C17.48 5.08 19.69 4 22.5 4 26.58 4 30 7.42 30 11.5c0 5-4.33 9.08-11.1 15.2L16 28.5z"/>
            </svg>
            <h1>Gửi Vợ Yêu Phương Anh</h1>
            <div id="message"></div><span class="cursor"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        // Nội dung tin nhắn - Bạn có thể đổi ở đây
        const textToType = "Anh mượn cả dải ngân hà này để gửi đến vợ lời chúc ngủ ngon ngọt ngào nhất. Hãy ngủ thật ngon, để lại mọi mệt mỏi cho anh gánh vác nhé. Yêu vợ mãi mãi! Gió ơi có bay về phương ấy?Nghiêng bên cửa sổ ghé bên phòng?Nếu thấy ai đó đang nằm ngủ?Nhắn dùm 4 chữ ” Ngủ ngon nhé cục vàng phương anh "
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * width,
                    size: Math.random() * 1.5,
                    color: `rgba(255, ${150 + Math.random() * 105}, ${200 + Math.random() * 55}, ${Math.random()})`
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);
            
            stars.forEach(s => {
                // Hiệu ứng 3D Starfield
                s.z -= 0.5; 
                if (s.z <= 0) s.z = width;

                const x = (s.x - width/2) * (width/s.z) + width/2;
                const y = (s.y - height/2) * (width/s.z) + height/2;
                const radius = s.size * (width/s.z);

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.fill();
            });

            // Hiệu ứng mây tinh vân (Nebula) mờ ảo
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, 'rgba(255, 45, 85, 0.03)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(draw);
        }

        // Viết chữ
        let charIndex = 0;
        function type() {
            if (charIndex < textToType.length) {
                document.getElementById('message').innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(type, 70);
            }
        }

        window.addEventListener('resize', init);
        
        // Chạy chương trình
        init();
        draw();
        setTimeout(type, 2000); // Đợi 2s sau khi hiện box mới viết chữ
    </script>
</body>
</html>
